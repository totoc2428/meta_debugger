<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meta Python - AST Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />

    <!-- CodeMirror 6 via ESM -->
    <script type="importmap">
      {
        "imports": {
          "codemirror": "https://esm.sh/codemirror@6.0.1",
          "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6.1.3",
          "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2",
          "@codemirror/state": "https://esm.sh/@codemirror/state@6.2.1",
          "@codemirror/view": "https://esm.sh/@codemirror/view@6.14.0"
        }
      }
    </script>

    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <h1>🐍 Meta Python</h1>
          <span class="subtitle">AST Visualizer & Debugger</span>
        </div>
        <div class="header-right">
          <div class="status" id="pyodide-status">
            <span class="status-dot loading"></span>
            <span id="status-text">Chargement de Pyodide...</span>
          </div>
          <button id="run-btn" class="btn btn-primary" disabled>
            <span class="btn-icon">▶</span> Exécuter
          </button>
          <button id="clear-btn" class="btn btn-secondary">
            <span class="btn-icon">🗑</span> Effacer
          </button>
        </div>
      </header>

      <!-- Main panels -->
      <main class="panels">
        <!-- Editor Panel -->
        <section class="panel" id="editor-panel">
          <div class="panel-header">
            <h2>Code Python</h2>
            <div class="panel-actions">
              <button id="example-btn" class="btn btn-small">Exemple</button>
            </div>
          </div>
          <div class="panel-content">
            <div id="editor"></div>
          </div>
        </section>

        <!-- AST Tree Panel -->
        <section class="panel" id="tree-panel">
          <div class="panel-header">
            <h2>AST Tree</h2>
            <div class="panel-actions">
              <button id="expand-all-btn" class="btn btn-small">
                Tout déplier
              </button>
              <button id="collapse-all-btn" class="btn btn-small">
                Tout replier
              </button>
            </div>
          </div>
          <div class="panel-content">
            <div id="ast-tree"></div>
          </div>
        </section>

        <!-- AST Graph Panel -->
        <section class="panel" id="graph-panel">
          <div class="panel-header">
            <h2>AST Graph</h2>
            <div class="panel-actions">
              <button id="reset-zoom-btn" class="btn btn-small">
                Reset Zoom
              </button>
            </div>
          </div>
          <div class="panel-content">
            <svg id="ast-graph"></svg>
          </div>
        </section>
      </main>

      <!-- Console Panel -->
      <footer class="console-panel">
        <div class="panel-header">
          <h2>Console & Debug</h2>
          <div class="console-tabs">
            <button class="tab-btn active" data-tab="output">Output</button>
            <button class="tab-btn" data-tab="methods">Method Calls</button>
            <button class="tab-btn" data-tab="attributes">
              Attribute Access
            </button>
          </div>
        </div>
        <div class="panel-content">
          <div class="tab-content active" id="output-tab">
            <pre id="output"></pre>
          </div>
          <div class="tab-content" id="methods-tab">
            <div id="method-calls"></div>
          </div>
          <div class="tab-content" id="attributes-tab">
            <div id="attribute-accesses"></div>
          </div>
        </div>
      </footer>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip"></div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
